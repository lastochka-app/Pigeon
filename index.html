<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Messenger Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>Чат по никнеймам</h1>

    <div id="auth-section">
        <input type="text" id="nick" placeholder="Никнейм">
        <input type="password" id="pass" placeholder="Пароль">
        <br><br>
        <button onclick="auth('signUp')">Регистрация</button>
        <button onclick="auth('signIn')">Войти</button>
    </div>

    <div id="chat-section" style="display:none;">
        <p>Вы: <b id="display-nick"></b> <button onclick="logout()">Выход</button></p>
        <div id="messages" style="height:300px; border:1px solid gray; overflow-y:scroll; padding:10px; margin-bottom:10px;"></div>
        <input type="text" id="msg-input" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') send()">
        <button onclick="send()">Отправить</button>
    </div>

    <script>
        const client = supabase.createClient('https://azjivomqimxhfztljsdm.supabase.co', 'sb_publishable_aQfjcnfrBIHlmB8tGXyuHw_W_TscQIA');
        let myNick = "";

        async function auth(type) {
            const username = document.getElementById('nick').value.trim();
            const password = document.getElementById('pass').value;
            const email = `${username.toLowerCase()}@test.com`;

            if (type === 'signUp') {
                const { data, error } = await client.auth.signUp({ email, password });
                if (error) return alert("Ошибка регистрации: " + error.message);
                
                // Сразу создаем профиль
                const { error: pErr } = await client.from('profiles').insert([{ id: data.user.id, username }]);
                if (pErr) console.log("Профиль уже есть или ошибка:", pErr.message);
                
                alert("Готово! Теперь нажми Войти");
            } else {
                const { data, error } = await client.auth.signInWithPassword({ email, password });
                if (error) return alert("Ошибка входа: " + error.message);
                checkUser();
            }
        }

        async function checkUser() {
            const { data: { user } } = await client.auth.getUser();
            if (user) {
                const { data: p } = await client.from('profiles').select('username').eq('id', user.id).single();
                if (p) {
                    myNick = p.username;
                    document.getElementById('auth-section').style.display = 'none';
                    document.getElementById('chat-section').style.display = 'block';
                    document.getElementById('display-nick').innerText = myNick;
                    load();
                    subscribe();
                }
            }
        }

        async function load() {
            const { data } = await client.from('messages').select('*').order('created_at', { ascending: true });
            const div = document.getElementById('messages');
            div.innerHTML = '';
            data?.forEach(m => div.innerHTML += `<div><b>${m.author_nickname}:</b> ${m.content}</div>`);
            div.scrollTop = div.scrollHeight;
        }

        async function send() {
            const input = document.getElementById('msg-input');
            if (!input.value) return;
            const { error } = await client.from('messages').insert([{ content: input.value, author_nickname: myNick }]);
            if (error) alert("Ошибка отправки: " + error.message);
            input.value = '';
        }

        function subscribe() {
            client.channel('any').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                const div = document.getElementById('messages');
                div.innerHTML += `<div><b>${payload.new.author_nickname}:</b> ${payload.new.content}</div>`;
                div.scrollTop = div.scrollHeight;
            }).subscribe();
        }

        function logout() { client.auth.signOut(); location.reload(); }

        checkUser();
    </script>
</body>
</html>
