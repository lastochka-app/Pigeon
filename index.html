<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Messenger by Nickname</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <h1>Мессенджер по никам</h1>

    <div id="auth-section">
        <input type="text" id="nickname" placeholder="Ваш ник (мин. 3 символа)">
        <input type="password" id="password" placeholder="Пароль">
        <br><br>
        <button onclick="handleAuth('signUp')">Зарегистрироваться</button>
        <button onclick="handleAuth('signIn')">Войти</button>
    </div>

    <div id="chat-section" style="display: none;">
        <p>Привет, <b id="user-display"></b>! <button onclick="signOut()">Выйти</button></p>
        <hr>
        <div id="messages-container" style="height: 400px; overflow-y: scroll; border: 2px solid #000; padding: 10px;"></div>
        <br>
        <input type="text" id="message-input" placeholder="Сообщение..." style="width: 70%;">
        <button onclick="sendMessage()">Отправить</button>
    </div>

    <script>
        const SUPABASE_URL = 'https://azjivomqimxhfztljsdm.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_aQfjcnfrBIHlmB8tGXyuHw_W_TscQIA';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let myNickname = "";

        // Основная функция для входа и регистрации
        async function handleAuth(type) {
            const nick = document.getElementById('nickname').value.trim().toLowerCase();
            const pass = document.getElementById('password').value;
            const fakeEmail = `${nick}@chat.com`;

            if (nick.length < 3) return alert("Ник слишком короткий!");

            if (type === 'signUp') {
                // 1. Проверяем, занят ли ник в таблице profiles
                const { data: existing } = await supabase
                    .from('profiles')
                    .select('username')
                    .eq('username', nick)
                    .single();

                if (existing) return alert("Этот ник уже занят!");

                // 2. Регистрация в Auth
                const { data, error } = await supabase.auth.signUp({ email: fakeEmail, password: pass });
                if (error) return alert(error.message);

                // 3. Создание записи в profiles
                if (data.user) {
                    const { error: profError } = await supabase
                        .from('profiles')
                        .insert([{ id: data.user.id, username: nick }]);
                    
                    if (profError) return alert("Ошибка создания профиля: " + profError.message);
                    alert("Регистрация успешна! Теперь нажмите 'Войти'");
                }
            } else {
                // Вход
                const { data, error } = await supabase.auth.signInWithPassword({ email: fakeEmail, password: pass });
                if (error) alert("Ошибка входа: " + error.message);
                else checkUser();
            }
        }

        async function signOut() {
            await supabase.auth.signOut();
            location.reload();
        }

        async function checkUser() {
            const { data: { user } } = await supabase.auth.getUser();
            if (user) {
                // Узнаем ник пользователя из базы
                const { data } = await supabase.from('profiles').select('username').eq('id', user.id).single();
                myNickname = data.username;
                
                document.getElementById('auth-section').style.display = 'none';
                document.getElementById('chat-section').style.display = 'block';
                document.getElementById('user-display').innerText = myNickname;
                
                loadMessages();
                subscribe();
            }
        }

        async function loadMessages() {
            const { data } = await supabase.from('messages').select('*').order('created_at', { ascending: true });
            if (data) {
                const container = document.getElementById('messages-container');
                container.innerHTML = '';
                data.forEach(msg => addMessageToUI(msg));
            }
        }

        async function sendMessage() {
            const input = document.getElementById('message-input');
            if (!input.value) return;

            const { error } = await supabase
                .from('messages')
                .insert([{ content: input.value, author_nickname: myNickname }]);

            if (error) alert(error.message);
            input.value = '';
        }

        function addMessageToUI(msg) {
            const container = document.getElementById('messages-container');
            const div = document.createElement('div');
            div.style.marginBottom = "5px";
            div.innerHTML = `<b>${msg.author_nickname}:</b> ${msg.content}`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function subscribe() {
            supabase
                .channel('room1')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                    addMessageToUI(payload.new);
                })
                .subscribe();
        }

        checkUser();
    </script>
</body>
</html>
